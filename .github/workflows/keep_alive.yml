name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */4 * * *'  # 4시간마다 실행 (UTC 기준)
  workflow_dispatch:        # 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          echo "Pinging Streamlit app at $(date)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://pickot-dashboard.streamlit.app/")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "App is alive!"
          else
            echo "Warning: App returned status $STATUS"
            exit 1
          fi
